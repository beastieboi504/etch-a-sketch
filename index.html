<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>etch-a-sketch</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="header">
        
        <h1>Etch-a-Sketch</h1> 
    </div>
    
    <div class="hero">
        
        <div class="menu">
            <div class="menu-header"><h2>Menu</h2></div>
            <div class="color-palette">
               <div class="color-picker-wrapper">
                <input type="color" id="color-picker">
                </div><span>Pen Color</span>
            </div>
            <div class="mode">
                <button id="color-mode" class="control">Color Mode</button>
                <button id="rainbow-mode" class="control">Rainbow Mode</button>
                <button id="eraser" class="control">Eraser</button>
                <button id="clear" class="control">Clear</button>
            </div>
            <div class="set-dimension">
                <button id="grid-btn">Set Grid Dimension</button>
            </div>
            
        </div>
        <div class="container"></div>
        
    </div>
</body>
</html>
